name: Build iOS IPA

on:
  workflow_dispatch:

concurrency:
  group: ios-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Print versions
        run: |
          node --version
          npm --version

      - name: Install pnpm
        run: npm install -g pnpm@11.4.0

      - name: Print pnpm version
        run: pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-spm-${{ hashFiles('ios/App/CapApp-SPM/Package.swift') }}

      - name: Build web (static export)
        run: |
          npm run prebuild:mobile
          npm run build:mobile
          npm run postbuild:mobile

      - name: Copy web to iOS
        run: npx cap copy

      - name: Build iOS binary (unsigned)
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            VALIDATE_PRODUCT=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R ios/App/build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r MiCuadre.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MiCuadre
          path: MiCuadre.ipa
